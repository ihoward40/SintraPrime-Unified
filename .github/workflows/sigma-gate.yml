name: "Sigma Gate"

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  sigma-gate:
    name: "Sigma Quality Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov bandit mypy

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --tb=short \
            --cov=. \
            --cov-report=json:/tmp/coverage.json \
            --cov-report=term-missing \
            --junitxml=/tmp/test-results.xml

      - name: Enforce coverage threshold
        run: |
          python -c "
          import json, sys
          data = json.load(open('/tmp/coverage.json'))
          pct = data['totals']['percent_covered']
          print(f'Coverage: {pct:.1f}%')
          if pct < 75:
              print(f'FAIL: Coverage {pct:.1f}% < 75% (Stage 3 ratchet — target: 80%)')
              sys.exit(1)
          print(f'PASS: Coverage {pct:.1f}% meets Stage 3 threshold (75%, target: 80%)')
          "

      # P0-002: || true removed. Bandit now uses .bandit-baseline.json so only
      # NEW findings (regressions) fail the build, not the 114 pre-existing ones.
      # P0-102: if: always() ensures bandit runs even when coverage threshold fails.
      - name: Security scan (bandit — baseline mode)
        if: always()
        run: |
          echo "Starting bandit scan..."
          python -m bandit -r . \
            --exclude .venv,node_modules,./tests,./portal/tests,__pycache__,.git,.nova,.mypy_cache,.pytest_cache,*.egg-info,dist,build,htmlcov,site-packages \
            --baseline .bandit-baseline.json \
            -f json -o /tmp/bandit.json || true
          echo "Bandit scan complete. Checking results..."
          ls -la /tmp/bandit.json
          python scripts/check_bandit.py
          echo "Check complete."

      - name: Post gate status
        if: always()
        run: |
          echo "Sigma gate completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"