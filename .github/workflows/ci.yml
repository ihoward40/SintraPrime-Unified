name: SintraPrime CI — 797 Tests
on:
  push:
    branches: [ main, dev, feature/* ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run full test suite (797 tests)
        run: python -m pytest --tb=short -q
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install ruff
      - run: ruff check . --output-format=github
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install security tools
        run: pip install safety bandit
      # P0-002: safety check is now fail-closed — no || true
      - name: Dependency vulnerability scan (safety)
        run: safety check -r requirements.txt
      # P0-002: bandit uses baseline to suppress pre-existing findings;
      # only NEW issues (not in .bandit-baseline.json) will fail the build.
      - name: Security lint (bandit — baseline mode)
        run: bandit -r . -x tests/ -ll --baseline .bandit-baseline.json
