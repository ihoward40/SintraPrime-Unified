name: Update Badges
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: python -m pytest --tb=no -q 2>&1 | tail -5
