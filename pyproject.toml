[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "sintraprime-unified"
version = "0.1.0"
description = "SintraPrime Unified: Superintelligence prototype with enterprise features"
authors = [{name = "Isiah Howard", email = "isiah@ikesolutions.org"}]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.9"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=4.0.0",
    "ruff>=0.2.0",
    "mypy>=1.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "bandit>=1.7.5",
    "safety>=2.3.5"
]

[project.dependencies]
requests = ">=2.33.0"
python-dotenv = ">=1.2.2"
python-multipart = ">=0.0.26"
fastapi = ">=0.100.0"
uvicorn = ">=0.23.0"
sqlalchemy = ">=2.0.0"
psycopg2-binary = ">=2.9.0"
pydantic = ">=2.0.0"
aiohttp = ">=3.8.0"
jwt = ">=1.3.0"
python-jose = ">=3.3.0"
passlib = ">=1.7.4"
bcrypt = ">=4.0.0"
stripe = ">=5.0.0"
openai = ">=1.0.0"
anthropic = ">=0.7.0"
pillow = ">=10.0.0"
celery = ">=5.3.0"
redis = ">=5.0.0"
flask = ">=3.0.0"
click = ">=8.1.0"
semver = ">=3.0.0"
pyyaml = ">=6.0"
marshmallow = ">=3.19.0"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=. --cov-report=html --cov-report=term-missing"

[tool.ruff]
line-length = 100
target-version = "py39"
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "SIM", "ARG", "TID", "TCH", "DTZ", "T20", "PT", "Q", "RSE", "RET", "SLF", "ISC", "LOG"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false

[tool.bandit]
exclude_dirs = ["tests"]
