[project]
name = "sintraprime-unified"
version = "2.0.0"
description = "SintraPrime UniVerse v2.0 — The smartest AI agent system"
requires-python = ">=3.11"

[tool.ruff]
target-version = "py311"
line-length = 120
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E501",   # line too long (handled by formatter)
    "E402",   # module level import not at top
    "F401",   # unused import (cleanup in progress)
    "F841",   # local variable assigned but never used
    "B008",   # function call in default argument
    "UP007",  # use X | Y for union types
]
exclude = [
    ".git",
    "__pycache__",
    "node_modules",
    ".venv",
    "venv",
    "build",
    "dist",
    "*.egg-info",
    "migrations",
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["E501", "B008"]

[tool.pytest.ini_options]
testpaths = ["tests", "portal/sso/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
markers = [
    "slow: marks tests as slow",
    "integration: marks integration tests",
    "security: marks security tests",
]

[tool.coverage.run]
source = ["portal", "agents", "packages"]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/__pycache__/*",
    "*/migrations/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.",
    "raise NotImplementedError",
    "pass",
    "except ImportError",
]
show_missing = true
fail_under = 70

[tool.bandit]
exclude_dirs = ["tests", "node_modules", ".venv"]
skips = ["B101", "B601"]
