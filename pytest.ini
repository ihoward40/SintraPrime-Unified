[pytest]
addopts = --tb=short -q --import-mode=importlib
testpaths =
    tests
    portal/tests
markers =
    experimental: experimental/integration tests requiring pending fixes
    integration: integration test suite (may require external services)
    slow: slow-running test (>1s)
norecursedirs =
    apps
    deployment
    web
    mobile
    models
    shared
    docs
    .github
    node_modules
    operator
    artifacts
    phase19/revenue_smoke_test
