name: IssueVerifier CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety email-validator

      - name: Run unit tests (scoped)
        run: pytest -q tests/

      # P0-002: bandit now uses .bandit-baseline.json to suppress pre-existing
      # findings. Only NEW issues (regressions) will fail the build.
      - name: Security lint (bandit — baseline mode)
        run: bandit -r . -x tests/ -ll --baseline .bandit-baseline.json

      - name: Dependency vulnerability scan (safety)
        run: safety check -r requirements.txt
