name: "🐛 Bug Report"
description: "Report a bug or incorrect output from SintraPrime-Unified"
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for reporting a bug!
        Please fill out this form as completely as possible.
        **For legal or financial inaccuracies, this is especially important.**

  - type: dropdown
    id: component
    attributes:
      label: "Affected Component"
      description: "Which part of SintraPrime is affected?"
      options:
        - "Trust Law Engine"
        - "Legal Intelligence System"
        - "Financial Mastery System"
        - "Credit Report Analyzer"
        - "Document Renderer"
        - "Legal Document Library"
        - "Financial Report Templates"
        - "Agent Parliament"
        - "Conscience Engine"
        - "twin TUI"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      options:
        - "🔴 Critical — Incorrect legal/financial output"
        - "🟠 High — Significant functionality broken"
        - "🟡 Medium — Functionality degraded"
        - "🟢 Low — Minor issue or cosmetic"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "Clear description of what went wrong"
      placeholder: "When I call FinancialReportTemplates.personal_financial_statement(), it returns..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What should have happened?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What actually happened? Include error messages and output."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: "Minimal code to reproduce the bug"
      render: python
      value: |
        from artifacts import ...

        # Minimal reproduction:

  - type: input
    id: version
    attributes:
      label: "SintraPrime Version"
      placeholder: "e.g., 1.0.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: "Python Version"
      placeholder: "e.g., 3.11.5"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "Operating System"
      options:
        - "Linux (Ubuntu/Debian)"
        - "Linux (Other)"
        - "macOS"
        - "Windows 11"
        - "Windows 10"
        - "Other"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      options:
        - label: "I have searched existing issues and this is not a duplicate"
          required: true
        - label: "I have reproduced this with the latest version"
          required: true
        - label: "I understand this is not legal or financial advice"
          required: true
