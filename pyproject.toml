[project]
name = "sintraprime-unified"
version = "2.0.0"
description = "SintraPrime UniVerse v2.0 — The smartest AI agent system. Unifies Python Universe, TypeScript ClawdBot, twin TUI, superintelligence layers, and all ihoward40 features into one monorepo."
authors = [
    {name = "Isiah T Howard", email = "ihoward40@users.noreply.github.com"}
]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"

dependencies = [
    "fastapi==0.115.7",
    "uvicorn[standard]==0.30.1",
    "sqlalchemy==2.0.35",
    "alembic==1.13.2",
    "pydantic==2.7.4",
    "python-jose[cryptography]==3.3.0",
    "passlib[bcrypt]==1.7.4",
    "aioredis==2.0.1",
    "httpx==0.27.0",
    "stripe==10.0.0",
    "python-multipart==0.0.26",
]

[project.optional-dependencies]
dev = [
    "pytest==7.4.4",
    "pytest-asyncio==0.23.2",
    "pytest-cov==4.1.0",
    "httpx==0.27.0",
    "ruff==0.3.5",
    "black==24.1.1",
    "mypy==1.8.0",
    "bandit==1.7.6",
]

[tool.ruff]
# Ruff linter configuration (Phase 22 modernization)
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# Enable plugins
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # Pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "A",     # flake8-builtins
    "C4",    # flake8-comprehensions
    "SIM",   # flake8-simplify
    "RET",   # flake8-return
    "ARG",   # flake8-unused-arguments
    "DTZ",   # flake8-datetimez
    "PT",    # flake8-pytest-style
    "RUF",   # ruff-specific
]
ignore = [
    "E501",   # line-too-long (handled by formatter)
    "E701",   # multiple-statements-on-one-line-colon
    "E702",   # multiple-statements-on-one-line-semicolon
    "E722",   # bare-except
    "SIM102", # nested-if-statements
    "DTZ011", # datetime.today() (noqa per file)
]

[tool.ruff.lint.isort]
profile = "black"
known-first-party = ["portal", "operator"]

[tool.pytest.ini_options]
addopts = "--strict-markers -v --tb=short"
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
asyncio_mode = "auto"

[tool.coverage.run]
source = ["portal", "operator"]
omit = [
    "*/tests/*",
    "*/conftest.py",
    "*/__pycache__/*",
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"
