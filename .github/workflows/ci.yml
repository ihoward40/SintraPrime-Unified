name: SintraPrime CI
on:
  push:
    branches: [ main, dev, feature/* ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run full test suite
        run: python -m pytest --tb=short -q
      - name: Report test inventory (dynamic count)
        run: python scripts/ci/report_test_inventory.py
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
      - name: Upload test inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-inventory
          path: artifacts/ci/test-inventory.json
          if-no-files-found: ignore
  postgresql-race:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sintraprime
          POSTGRES_PASSWORD: sintraprime
          POSTGRES_DB: sintraprime_unified
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sintraprime -d sintraprime_unified"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Wait for PostgreSQL readiness
        env:
          DATABASE_URL: postgresql+asyncpg://sintraprime:sintraprime@127.0.0.1:5432/sintraprime_unified
        run: |
          python - <<'PY'
          import asyncio
          import os

          import asyncpg

          async def main() -> None:
              url = os.environ["DATABASE_URL"].replace("+asyncpg", "")
              for attempt in range(60):
                  try:
                      conn = await asyncpg.connect(url)
                      await conn.execute("SELECT 1")
                      await conn.close()
                      return
                  except Exception:
                      if attempt == 59:
                          raise
                      await asyncio.sleep(1)

          asyncio.run(main())
          PY
      - name: Prepare PostgreSQL schema
        env:
          DATABASE_URL: postgresql+asyncpg://sintraprime:sintraprime@127.0.0.1:5432/sintraprime_unified
        run: |
          python - <<'PY'
          import asyncio
          import os

          from portal import models as _models  # noqa: F401
          from portal.database import Base
          from sqlalchemy.ext.asyncio import create_async_engine

          async def main() -> None:
              engine = create_async_engine(os.environ["DATABASE_URL"], echo=False)
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)
              await engine.dispose()

          asyncio.run(main())
          PY
      - name: Run PostgreSQL concurrency test
        env:
          DATABASE_URL: postgresql+asyncpg://sintraprime:sintraprime@127.0.0.1:5432/sintraprime_unified
          MISSION_CONTROL_PG_RACE_REQUIRED: '1'
        run: |
          set -euo pipefail
          python -m pytest -vv -rs -s --tb=long --maxfail=1 \
            portal/tests/test_mission_control_run_controls.py::test_parallel_pg_transition_race_appends_exactly_one_event \
            portal/tests/test_mission_control_run_controls.py::test_pg_flushed_transition_rollback_does_not_persist \
            | tee /tmp/pg_race.log
          grep -q '2 passed' /tmp/pg_race.log
          ! grep -q 'SKIPPED' /tmp/pg_race.log
      - name: Upload PostgreSQL race log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pg-race-log
          path: /tmp/pg_race.log
          if-no-files-found: ignore
  postgresql-bootstrap-certification:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sintraprime_bootstrap
          POSTGRES_PASSWORD: sintraprime_bootstrap
          POSTGRES_DB: sintraprime_bootstrap_certification
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sintraprime_bootstrap -d sintraprime_bootstrap_certification"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run raw-SQL PostgreSQL bootstrap certification
        env:
          PGPASSWORD: sintraprime_bootstrap
          PGHOST: 127.0.0.1
          PGPORT: '5432'
          PGDATABASE: sintraprime_bootstrap_certification
          PGUSER: sintraprime_bootstrap
        run: |
          set -euo pipefail
          python - <<'PY' | tee /tmp/postgresql-bootstrap-certification.log
          import os
          import pytest

          scheme = "postgresql" + "://"
          os.environ["POSTGRESQL_BOOTSTRAP_TEST_DATABASE_URL"] = (
              scheme
              + os.environ["PGUSER"]
              + "@"
              + os.environ["PGHOST"]
              + ":"
              + os.environ["PGPORT"]
              + "/"
              + os.environ["PGDATABASE"]
          )
          raise SystemExit(pytest.main([
              "-vv",
              "-rs",
              "--tb=long",
              "--maxfail=1",
              "portal/tests/test_postgresql_bootstrap_schema_authority.py",
          ]))
          PY
          ! grep -q 'SKIPPED' /tmp/postgresql-bootstrap-certification.log
      - name: Upload PostgreSQL bootstrap certification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-bootstrap-certification-log
          path: /tmp/postgresql-bootstrap-certification.log
          if-no-files-found: ignore
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install ruff==0.15.20
      - run: ruff check . --output-format=github
  claims-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate documentation and claims integrity
        run: python scripts/ci/validate_repository_claims.py
      - name: Run validator tests
        run: python -m pytest scripts/ci/tests/ -q
  auth-tenant-rbac-certification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run auth/tenant/RBAC certification suite
        run: set -o pipefail && python -m pytest portal/tests/test_auth_tenant_rbac_certification.py -q | tee /tmp/auth-tenant-rbac-certification.log
      - name: Upload certification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-tenant-rbac-certification-log
          path: /tmp/auth-tenant-rbac-certification.log
          if-no-files-found: ignore
  audit-correlation-non-http-certification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run audit correlation and non-HTTP certification suite
        run: set -o pipefail && python -m pytest portal/tests/test_audit_correlation_non_http_certification.py -q | tee /tmp/audit-correlation-non-http-certification.log
      - name: Upload certification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-correlation-non-http-certification-log
          path: /tmp/audit-correlation-non-http-certification.log
          if-no-files-found: ignore
  http-correlation-ws-hardening-certification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run HTTP correlation and WebSocket hardening certification suite
        run: set -o pipefail && python -m pytest portal/tests/test_http_correlation_ws_hardening_certification.py -q | tee /tmp/http-correlation-ws-hardening-certification.log
      - name: Upload certification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-correlation-ws-hardening-certification-log
          path: /tmp/http-correlation-ws-hardening-certification.log
          if-no-files-found: ignore
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install security tools
        run: pip install safety bandit
      - name: Dependency vulnerability scan (safety)
        run: safety check -r requirements.txt
      - name: Security lint (bandit — baseline mode)
        run: bandit -r . -x tests/,portal/tests/ -ll --baseline .bandit-baseline.json -f json -o /tmp/bandit.json || true && python scripts/check_bandit.py
