name: Deploy SintraPrime
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker-compose build
      - name: Tag release
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "Deploying ${{ github.ref_name }}"
