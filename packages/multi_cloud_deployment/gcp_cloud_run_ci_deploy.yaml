steps:\n-name:gcr.io/cloud-builders/docker\n id:Build\n args:\n -build\n -t\n -gcr.io/$PROJECT_ID/filing-orchestrator:latest\n -.\n-name:gcr.io/cloud-builders/docker\n id:Push\n args:\n -push\n -gcr.io/$PROJECT_ID/filing-orchestrator:latest\n waitFor:[Build]\n-name:gcr.io/cloud-builders/gke-deploy\n id:Test\n args:\n -run\n -f=packages/multi_cloud_deployment/test_multi_cloud.py\n -location=us-central1\n-name:gcr.io/cloud-builders/gke-deploy\n id:Deploy\n args:\n -run\n -p=$PROJECT_ID\n --filename=packages/multi_cloud_deployment/\n images:\n -gcr.io/$PROJECT_ID/filing-orchestrator:latest\n timeout:1800s