[pytest]
addopts = --tb=short -q --import-mode=importlib
testpaths =
    tests
    portal/tests
    academy/tests
python_files = test_*.py
asyncio_mode = auto
markers =
    asyncio: marks tests that require an asyncio event loop
norecursedirs =
    apps
    deployment
    web
    mobile
    models
    shared
    docs
    .github
    node_modules
    operator
    artifacts
    phase19/revenue_smoke_test